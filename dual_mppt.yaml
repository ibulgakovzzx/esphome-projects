substitutions:
  name: dual_mppt
  friendly_name: "Dual MPPT Wind Solar"
  device_description: "Dual MPPT Wind/Solar via WeAct CAN485 RS485 (REGISTER PROBE BUILD)"
  # WeAct CAN485 DevBoard RS485 pins
  tx_pin: GPIO22
  rx_pin: GPIO21
  flow_control_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

esp32:
  board: esp32dev
  flash_size: 8MB
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:
  level: DEBUG

# RS485 UART — debug включён, чтобы видеть сырые кадры >>> / <<<
uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  debug:
    direction: BOTH

# Стандартный modbus-стек (не jnge_modbus) — сам считает CRC
modbus:
  id: modbus0
  uart_id: uart_bus
  flow_control_pin: ${flow_control_pin}

modbus_controller:
  - id: mppt
    address: 0x06
    modbus_id: modbus0
    update_interval: 5s

# ---- ЗОНДЫ РЕГИСТРОВ ----
# custom_command шлёт сырые байты как есть (CRC досчитывается автоматически).
# address/register_type для таких сенсоров не нужны — они игнорируются.
# Байты: [slave, function, addr_hi, addr_lo, count_hi, count_lo]
sensor:
  # Блок 1: input-регистры 0x0000..0x0009 (10 шт)
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Block A 0x0000-0009"
    custom_command: [0x06, 0x04, 0x00, 0x00, 0x00, 0x0A]
    value_type: U_WORD

  # Блок 2: input-регистры 0x000A..0x0013 (10 шт)
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Block B 0x000A-0013"
    custom_command: [0x06, 0x04, 0x00, 0x0A, 0x00, 0x0A]
    value_type: U_WORD

  # Блок 3: input-регистры 0x0014..0x001D (10 шт)
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Block C 0x0014-001D"
    custom_command: [0x06, 0x04, 0x00, 0x14, 0x00, 0x0A]
    value_type: U_WORD
