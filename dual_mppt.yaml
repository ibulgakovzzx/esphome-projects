substitutions:
  name: dual_mppt
  friendly_name: "Dual MPPT Wind Solar"
  device_description: "Dual MPPT Wind/Solar via WeAct CAN485 RS485 (DIAGNOSTIC BUILD)"
  # WeAct CAN485 DevBoard RS485 pins
  tx_pin: GPIO22
  rx_pin: GPIO21
  flow_control_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

esp32:
  board: esp32dev
  flash_size: 8MB
  framework:
    type: arduino

# external_components (jnge) временно не нужны для диагностики —
# закомментировано, чтобы не тянуть лишний код и не путать сборку
# external_components:
#   - source: github://syssi/esphome-jnge-mppt-controller@main
#     refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:
  level: DEBUG

# RS485 UART — оставляем debug включённым, чтобы видеть сырые кадры >>> / <<<
uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  debug:
    direction: BOTH

