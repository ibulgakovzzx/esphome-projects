# ---- ДИАГНОСТИКА через стандартный modbus_controller ----
modbus:
  id: modbus0
  uart_id: uart_bus
  flow_control_pin: ${flow_control_pin}

modbus_controller:
  - id: mppt
    address: 0x06
    modbus_id: modbus0
    update_interval: 5s

sensor:
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe Battery voltage"
    register_type: holding
    address: 0x1000
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe PV voltage"
    register_type: holding
    address: 0x1001
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe Wind voltage"
    register_type: holding
    address: 0x1002
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe PV charging current"
    register_type: holding
    address: 0x1003
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe Wind charging current"
    register_type: holding
    address: 0x1004
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe PV charging power"
    register_type: holding
    address: 0x1005
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe Wind charging power"
    register_type: holding
    address: 0x1006
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe PV total energy"
    register_type: holding
    address: 0x1007
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe Wind total energy"
    register_type: holding
    address: 0x1008
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
