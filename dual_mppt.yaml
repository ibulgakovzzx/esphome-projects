substitutions:
  name: dual_mppt
  friendly_name: "Dual MPPT Wind Solar"
  device_description: "Dual MPPT Wind/Solar via WeAct CAN485 RS485 (modbus_controller)"
  tx_pin: GPIO22
  rx_pin: GPIO21
  flow_control_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

esp32:
  board: esp32dev
  flash_size: 8MB
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:
  level: DEBUG

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  debug:
    direction: BOTH   # оставьте на время проверки, потом можно убрать

modbus:
  id: modbus0
  uart_id: uart_bus
  flow_control_pin: ${flow_control_pin}

modbus_controller:
  - id: mppt
    address: 0x06
    modbus_id: modbus0
    update_interval: 5s
    # ВАЖНО: у платы лимит длины запроса (~10 регистров).
    # modbus_controller сам смёрджит соседние адреса, поэтому
    # держим все сенсоры в компактном диапазоне 0x03..0x0D (11 рег.).
    # Если снова словите exception 0x02 из-за длины —
    # раскомментируйте второй контроллер mppt2 ниже и разнесите блоки.

# ============================================================
#  INPUT-РЕГИСТРЫ (Modbus function 0x04 == register_type: read)
#  Смещение −4 относительно документа Wind Solar Controller 1kW.
#  Документ: Batt=0x07 → у вас 0x03 (подтв.). Применено ко всей карте.
# ============================================================
sensor:
  # ---------- ПОДТВЕРЖДЕНО ----------
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Battery voltage"        # док 0x07 → у вас 0x03 (539=53.9В ✅)
    register_type: read
    address: 0x0003
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Controller temperature" # у вас 0x07 (399=39.9°C ✅)
    register_type: read
    address: 0x0007
    value_type: U_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  # ---------- ПРЕДПОЛОЖИТЕЛЬНО (смещение −4 от документа) ----------
  # Документ 0x08 Total Charge Current → у вас 0x04
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Total charge current"
    register_type: read
    address: 0x0004
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]   # уточнить днём: 0.1 или 0.01

  # Документ 0x09 Total instantaneous power → у вас 0x05
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Total power"
    register_type: read
    address: 0x0005
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Документ 0x0A Wind turbine voltage → у вас 0x06
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Wind voltage"
    register_type: read
    address: 0x0006
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  # Документ 0x0B Wind turbine current → у вас 0x07?
  # ВНИМАНИЕ: 0x07 у вас уже = температура. Значит смещение
  # НЕ идеально −4 по всей карте, либо wind current лежит иначе.
  # Оставляю кандидатов ниже, проверить днём при ветре.
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Wind current (candidate 0x08)"
    register_type: read
    address: 0x0008
    value_type: U_WORD
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  # Документ 0x0C Solar panel voltage → кандидат у вас ~0x08..0x0A
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "PV voltage (candidate 0x09)"
    register_type: read
    address: 0x0009
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  # Документ 0x0D Solar panel current → кандидат
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "PV current (candidate 0x0A)"
    register_type: read
    address: 0x000A
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  # Документ 0x0E Wind power → кандидат
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Wind power (candidate 0x0B)"
    register_type: read
    address: 0x000B
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Документ 0x0F Solar power → кандидат
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "PV power (candidate 0x0C)"
    register_type: read
    address: 0x000C
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # Документ 0x10/0x11 Total generated (ветер/солнце) — часто 32-бит.
  # Кандидат, уточнить тип (U_WORD vs U_DWORD) по величине днём.
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Energy total (candidate 0x0D)"
    register_type: read
    address: 0x000D
    value_type: U_WORD
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

# ============================================================
#  ЗАПАСНОЙ ВАРИАНТ — если словите exception 0x02 из-за длины
#  запроса, раскомментируйте и распределите сенсоры по 2 контроллерам.
# ============================================================
#  - id: mppt2
#    address: 0x06
#    modbus_id: modbus0
#    update_interval: 5s
