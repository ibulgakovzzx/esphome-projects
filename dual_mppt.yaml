substitutions:
  name: dual_mppt
  friendly_name: "Dual MPPT Wind Solar"
  device_description: "Dual MPPT Wind/Solar via WeAct CAN485 RS485 (REGISTER PROBE BUILD)"
  # WeAct CAN485 DevBoard RS485 pins
  tx_pin: GPIO22
  rx_pin: GPIO21
  flow_control_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

esp32:
  board: esp32dev
  flash_size: 8MB
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:
  level: DEBUG

# RS485 UART — debug включён, чтобы видеть сырые кадры >>> / <<<
uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  debug:
    direction: BOTH

# Стандартный modbus-стек (не jnge_modbus) — сам считает CRC
modbus:
  id: modbus0
  uart_id: uart_bus
  flow_control_pin: ${flow_control_pin}

modbus_controller:
  - id: mppt
    address: 0x06
    modbus_id: modbus0
    update_interval: 5s

# ---- ЗОНДЫ РЕГИСТРОВ ----
# custom_command шлёт сырые байты как есть (CRC досчитывается автоматически).
# address/register_type для таких сенсоров не нужны — они игнорируются.
# Байты: [slave, function, addr_hi, addr_lo, count_hi, count_lo]
sensor:
  # Читаем блок holding-регистров 0x0000..0x0009 одним запросом,
  # раскладываем по отдельным сенсорам через offset
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0000"
    custom_command: [0x06, 0x03, 0x00, 0x00, 0x00, 0x0A]
    value_type: U_WORD
    # первый регистр блока (offset 0)
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0001"
    register_type: holding
    address: 0x0001
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0002"
    register_type: holding
    address: 0x0002
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0003"
    register_type: holding
    address: 0x0003
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0004"
    register_type: holding
    address: 0x0004
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0005"
    register_type: holding
    address: 0x0005
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0006"
    register_type: holding
    address: 0x0006
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0007"
    register_type: holding
    address: 0x0007
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0008"
    register_type: holding
    address: 0x0008
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "H reg 0x0009"
    register_type: holding
    address: 0x0009
    value_type: U_WORD

  # То же для input-регистров (F04) 0x0000..0x0009
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0000"
    register_type: read
    address: 0x0000
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0001"
    register_type: read
    address: 0x0001
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0002"
    register_type: read
    address: 0x0002
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0003"
    register_type: read
    address: 0x0003
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0004"
    register_type: read
    address: 0x0004
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0005"
    register_type: read
    address: 0x0005
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0006"
    register_type: read
    address: 0x0006
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0007"
    register_type: read
    address: 0x0007
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0008"
    register_type: read
    address: 0x0008
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "I reg 0x0009"
    register_type: read
    address: 0x0009
    value_type: U_WORD
