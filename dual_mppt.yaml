substitutions:
  name: dual_mppt
  friendly_name: "Dual MPPT Wind Solar"
  device_description: "Dual MPPT Wind/Solar via WeAct CAN485 RS485 (REGISTER PROBE BUILD)"
  # WeAct CAN485 DevBoard RS485 pins
  tx_pin: GPIO22
  rx_pin: GPIO21
  flow_control_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

esp32:
  board: esp32dev
  flash_size: 8MB
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:
  level: DEBUG

# RS485 UART — debug включён, чтобы видеть сырые кадры >>> / <<<
uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  debug:
    direction: BOTH

# Стандартный modbus-стек (не jnge_modbus) — сам считает CRC
modbus:
  id: modbus0
  uart_id: uart_bus
  flow_control_pin: ${flow_control_pin}

modbus_controller:
  - id: mppt
    address: 0x06
    modbus_id: modbus0
    update_interval: 5s

# ---- ЗОНДЫ РЕГИСТРОВ ----
# custom_command шлёт сырые байты как есть (CRC досчитывается автоматически).
# address/register_type для таких сенсоров не нужны — они игнорируются.
# Байты: [slave, function, addr_hi, addr_lo, count_hi, count_lo]
sensor:
  # --- EPEVER / Tracer типовая карта ---
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F04 0x3100 (EPEVER real-time)"
    custom_command: [0x06, 0x04, 0x31, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F04 0x3000 (EPEVER rated)"
    custom_command: [0x06, 0x04, 0x30, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x9000 (EPEVER settings)"
    custom_command: [0x06, 0x03, 0x90, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x3200 (EPEVER status)"
    custom_command: [0x06, 0x03, 0x32, 0x00, 0x00, 0x02]
    value_type: U_WORD

  # --- Прочие частые базовые адреса ---
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x0000"
    custom_command: [0x06, 0x03, 0x00, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F04 0x0000"
    custom_command: [0x06, 0x04, 0x00, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x0100"
    custom_command: [0x06, 0x03, 0x01, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x2000"
    custom_command: [0x06, 0x03, 0x20, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x4000"
    custom_command: [0x06, 0x03, 0x40, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F04 0x9000"
    custom_command: [0x06, 0x04, 0x90, 0x00, 0x00, 0x02]
    value_type: U_WORD

  # --- Соседи вокруг 0x1000 (вдруг данные рядом, но не на самом 0x1000) ---
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F04 0x1000"
    custom_command: [0x06, 0x04, 0x10, 0x00, 0x00, 0x02]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x1000 single"
    custom_command: [0x06, 0x03, 0x10, 0x00, 0x00, 0x01]
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Probe F03 0x0001"
    custom_command: [0x06, 0x03, 0x00, 0x01, 0x00, 0x02]
    value_type: U_WORD
