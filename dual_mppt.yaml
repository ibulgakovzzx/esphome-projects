substitutions:
  name: dual_mppt
  friendly_name: "Dual MPPT Wind Solar"
  device_description: "Dual MPPT Wind/Solar via WeAct CAN485 RS485 (modbus_controller)"
  tx_pin: GPIO22
  rx_pin: GPIO21
  flow_control_pin: GPIO17

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}

esp32:
  board: esp32dev
  flash_size: 8MB
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: "12345678"

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

logger:
  level: DEBUG

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  debug:
    direction: BOTH   # оставьте на время проверки, потом можно убрать

modbus:
  id: modbus0
  uart_id: uart_bus
  flow_control_pin: ${flow_control_pin}

modbus_controller:
  - id: mppt
    address: 0x06
    modbus_id: modbus0
    update_interval: 2s

sensor:
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Battery voltage"
    register_type: read
    address: 0x0003
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Total charge current"
    register_type: read
    address: 0x0004
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Total power"
    register_type: read
    address: 0x0005
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # 0x06 = ток ветра, 0x08 = напряжение ветра
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Wind current"
    register_type: read
    address: 0x0006
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Controller temperature"
    register_type: read
    address: 0x0007
    value_type: U_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Wind voltage"
    register_type: read
    address: 0x0008
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "PV current"
    register_type: read
    address: 0x0009
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  # По дисплею: 0x0A = мощность ветра, 0x0B = напряжение PV
  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Wind power"
    register_type: read
    address: 0x000A
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "PV voltage"
    register_type: read
    address: 0x000B
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "PV power"
    register_type: read
    address: 0x000C
    value_type: U_WORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

  - platform: modbus_controller
    modbus_controller_id: mppt
    name: "Energy total"
    register_type: read
    address: 0x000D
    value_type: U_WORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters: [{ multiply: 0.1 }]

# ============================================================
#  ЗАПАСНОЙ ВАРИАНТ — если словите exception 0x02 из-за длины
#  запроса, раскомментируйте и распределите сенсоры по 2 контроллерам.
