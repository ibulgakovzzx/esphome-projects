substitutions:
  name: jnge-wind-solar-hybrid
  status: "status"
  config: "config"
  device_description: "JNGE Wind/Solar Controller via WeAct CAN485"
  external_components_source: github://syssi/esphome-jnge-mppt-controller@main
  # WeAct CAN485 RS485 pins
  tx_pin: GPIO22   # DI (TX → RS485)
  rx_pin: GPIO21   # RO (RX ← RS485)

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jnge-mppt-controller"
    version: 1.6.0

esp32:
  board: esp32dev   # Generic ESP32 — WeAct CAN485 базируется на стандартном ESP32
  framework:
    type: esp-idf
    advanced:
      ignore_efuse_mac_crc: false   # нужно для ESP32-D0WD-V3 rev 3.1

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  level: DEBUG

# Home Assistant native API (убери mqtt секцию если используешь HA)
api:
  encryption:
    key: !secret api_encryption_key

# Раскомментируй если хочешь MQTT вместо native API:
# mqtt:
#   broker: !secret mqtt_host
#   username: !secret mqtt_username
#   password: !secret mqtt_password

uart:
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  # WeAct CAN485 имеет аппаратный DE pin (GPIO17), ESPHome JNGE компонент
  # управляет направлением через самот RS485 модуль автоматически.
  # Если связь не работает, добавь явно:
  # stop_bits: 1
  # parity: NONE

jnge_wind_solar_controller:
  enable_fake_traffic: false
  update_interval: 2s

binary_sensor:
  - platform: jnge_wind_solar_controller
    load_detected:
      name: "${status} load detected"
    load:
      name: "${status} load"
    charging:
      name: "${status} charging"

sensor:
  - platform: jnge_wind_solar_controller
    firmware_version:
      name: "${status} firmware version"
    peak_pv_charging_rating:
      name: "${status} peak pv charging rating"
    peak_fan_charging_rating:
      name: "${status} peak fan charging rating"
    pv_voltage:
      name: "${status} pv voltage"
    fan_voltage:
      name: "${status} fan voltage"
    battery_voltage:
      name: "${status} battery voltage"
    pv_charging_current:
      name: "${status} pv charging current"
    fan_charging_current:
      name: "${status} fan charging current"
    pv_charging_power:
      name: "${status} pv charging power"
    fan_charging_power:
      name: "${status} fan charging power"
    pv_total_energy:
      name: "${status} pv total energy"
    fan_total_energy:
      name: "${status} fan total energy"
    operation_mode_id:
      name: "${status} operation mode id"
    battery_strings:
      name: "${status} battery strings"
    battery_voltage_level:
      name: "${status} battery voltage level"
    error_bitmask:
      name: "${status} error bitmask"

switch:
  - platform: jnge_wind_solar_controller
    street_light_mode:
      name: "${config} street light mode"
    charging:
      name: "${config} charging"
    load:
      name: "${config} load"

text_sensor:
  - platform: jnge_wind_solar_controller
    battery_type:
      name: "${status} battery type"
    errors:
      name: "${status} errors"
    operation_mode:
      name: "${status} operation mode"
