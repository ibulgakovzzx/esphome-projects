substitutions:
  name: jnge-wind-solar-hybrid
  status: "status"
  config: "config"
  device_description: "JNGE Wind/Solar Controller via WeAct CAN485"
  tx_pin: GPIO22
  rx_pin: GPIO21

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jnge-mppt-controller"
    version: 1.6.0

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

external_components:
  - source:
      type: git
      url: https://github.com/syssi/esphome-jnge-mppt-controller
      ref: main
    components: [jnge_modbus, jnge_wind_solar_controller]
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome

logger:
  level: VERY_VERBOSE
  logs:
    uart: DEBUG
    uart.idf: DEBUG
    jnge_modbus: VERY_VERBOSE
    jnge_wind_solar_controller: VERY_VERBOSE
    sensor: INFO
    text_sensor: INFO
    binary_sensor: INFO
    switch: INFO

api:
  encryption:
    key: !secret api_encryption_key

uart:
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}

jnge_wind_solar_controller:
  address: 0x01
  enable_fake_traffic: false
  update_interval: 2s

binary_sensor:
  - platform: jnge_wind_solar_controller
    load_detected:
      name: "${status} load detected"
    load:
      name: "${status} load"
    charging:
      name: "${status} charging"

sensor:
  - platform: jnge_wind_solar_controller
    firmware_version:
      name: "${status} firmware version"
    peak_pv_charging_rating:
      name: "${status} peak pv charging rating"
    peak_fan_charging_rating:
      name: "${status} peak fan charging rating"
    pv_voltage:
      name: "${status} pv voltage"
    fan_voltage:
      name: "${status} fan voltage"
    battery_voltage:
      name: "${status} battery voltage"
    pv_charging_current:
      name: "${status} pv charging current"
    fan_charging_current:
      name: "${status} fan charging current"
    pv_charging_power:
      name: "${status} pv charging power"
    fan_charging_power:
      name: "${status} fan charging power"
    pv_total_energy:
      name: "${status} pv total energy"
    fan_total_energy:
      name: "${status} fan total energy"
    operation_mode_id:
      name: "${status} operation mode id"
    battery_strings:
      name: "${status} battery strings"
    battery_voltage_level:
      name: "${status} battery voltage level"
    error_bitmask:
      name: "${status} error bitmask"

switch:
  - platform: jnge_wind_solar_controller
    street_light_mode:
      name: "${config} street light mode"
    charging:
      name: "${config} charging"
    load:
      name: "${config} load"

text_sensor:
  - platform: jnge_wind_solar_controller
    battery_type:
      name: "${status} battery type"
    errors:
      name: "${status} errors"
    operation_mode:
      name: "${status} operation mode"
button:
  - platform: template
    name: "Test RS485 raw"
    on_press:
      - uart.write:
          # Modbus запрос: адрес 0x01, функция 0x03, регистр 0x0000, кол-во 0x0020, CRC
          data: [0x01, 0x03, 0x00, 0x00, 0x00, 0x20, 0x44, 0x06]
